services:
  web:
    image: ${IMAGE_NAME}
    container_name: test_framework_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn skillcrafts_test_framework.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2"
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - .env
    volumes:
      - test_framework_static_volume:/app/staticfiles
      - test_framework_media_volume:/app/media
    networks:
      - drf_blog_api_backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  drf_blog_api_backend:
    external: true
    name: drf_blog_api_backend

volumes:
  test_framework_static_volume:
    driver: local
  test_framework_media_volume:
    driver: local