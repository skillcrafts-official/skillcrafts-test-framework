{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki – SkillCrafts Test Framework</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Pygments CSS для подсветки кода -->
    <link href="{% static 'test_platform/pygments.css' %}" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8f9fa;
            margin: 0;
        }
        .wiki-container {
            display: flex;
            min-height: 100vh;
        }
        .wiki-sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #dee2e6;
            padding: 1rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .wiki-content {
            flex: 1;
            background: #ffffff;
            padding: 2rem 3rem;
        }
        .wiki-sidebar .nav-link {
            color: #212529;
            padding: .25rem 0;
        }
        .wiki-sidebar .nav-link.active {
            color: #0d6efd;
            font-weight: 500;
        }
        .wiki-sidebar strong.nav-link {
            color: #495057;
        }
        .wiki-sidebar ul {
            list-style: none;
            padding-left: 1rem;
        }
        .wiki-content h1 {
            border-bottom: 2px solid #e9ecef;
            padding-bottom: .3em;
            margin-top: 1.5rem;
        }
        .wiki-content pre {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: .25rem;
        }
        code {
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 0.9em;
        }
        a {
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .btn-back-dashboard {
            margin-bottom: 1rem;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="wiki-container">
        <!-- Боковая панель навигации -->
        <nav class="wiki-sidebar">
            <a href="/" class="btn btn-outline-secondary btn-sm btn-back-dashboard">← Dashboard</a>
            <h5 class="mt-3 mb-3">Documentation</h5>
            <ul class="nav flex-column">
                {% include "test_platform/wiki_tree.html" with tree=wiki_tree current_path=current_path %}
            </ul>
        </nav>

        <!-- Основная область контента -->
        <main class="wiki-content">
            {{ html_content|safe }}
        </main>
    </div>
</body>
</html>
